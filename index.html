<!DOCTYPE html>
<html>
  <head>
    <style>
    table {
            width: 600px;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            margin: 20px auto;
        }
        td {
            padding: 10px;
            border: 1px solid #ccc;
        }
      th {
            padding: 10px;
            border: 1px solid #ccc;
      }
        /* ခေါင်းစဉ်အပိုင်းကို စာလုံးအထူလုပ်ဖို့ */
        .label {
            font-weight: bold;
            width: 150px;
            background-color: #f2f2f2;
        }
        .heading {
            background-color: #333;
            color: white;
            font-weight: bold;
            text-align: center;
        }
  </style>
  </head>
    <body>
    <div>
      <h1 style="text-align:center; color: red; background-color: black;">this my first test</h1>
      <h1 style="text-align:center;">Centered Heading</h1>
<p style="text-align:center;">Centered paragraph.</p>
      <p>My name's Ye Naing Soe<br> i'm 26 and i live in Yangon</p>
      <table>
           <tr>
           <td> Name </td>
           <td> age </td>
           <td> phone </td>
           </tr>
        <tr>
           <th> Ye Naing Soe</th>
           <th> 26 </th>
           <th> 09767287345 </th>
        </tr>
      </table >

    </body>
</html>
